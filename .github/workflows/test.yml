name: Test Setup

on:
  workflow_dispatch:  # Manual trigger only

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4 # Updated from v3 to v4

      - name: Set up Python
        uses: actions/setup-python@v5 # Updated from v4 to v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Check secrets are configured
        env:
          MY_EMAIL: ${{ secrets.MY_EMAIL }}
          MY_PASSWORD: ${{ secrets.MY_PASS }}
        run: |
          if [ -z "$MY_EMAIL" ]; then
            echo "MY_EMAIL secret is not set!"
            exit 1
          else
            echo "MY_EMAIL is configured"
          fi

          if [ -z "$MY_PASSWORD" ]; then
            echo "MY_PASSWORD secret is not set!"
            exit 1
          else
            echo "MY_PASSWORD is configured"
          fi

      - name: Check required files exist
        run: |
          for file in main.py requirements.txt; do
            if [ -f "$file" ]; then
              echo "$file found"
            else
              echo "$file not found!"
              exit 1
            fi
          done

      - name: Test Python syntax
        run: python -m py_compile main.py && echo "Python syntax OK"

      - name: Success
        run: |
          echo "========================================"
          echo "  All checks passed!"
          echo "  Your setup is ready to go."
          echo "========================================"
